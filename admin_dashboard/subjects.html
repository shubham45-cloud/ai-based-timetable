<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus & Course Matrix Schema</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --surface-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --brand-color: #4f46e5;
            --accent-amber: #f59e0b;
            --accent-teal: #0d9488;
            --accent-red: #ef4444;
            --border-subtle: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-primary); color: var(--text-main); padding: 40px 24px; min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; }
        
        /* Header Area */
        .header-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-title h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.75px; }
        .header-title p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
        .action-buttons-group { display: flex; gap: 12px; }
        
        .back-dashboard-btn { background: var(--surface-card); color: #475569; border: 1px solid var(--border-subtle); padding: 12px 24px; border-radius: 14px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.25s; }
        .back-dashboard-btn:hover { background: #f1f5f9; transform: translateX(-4px); }
        .add-subject-master-btn { background: var(--brand-color); color: #ffffff; border: none; padding: 12px 24px; border-radius: 14px; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15); transition: 0.25s; }
        .add-subject-master-btn:hover { background: #4338ca; transform: translateY(-2px); }

        /* Analytics Panels Counters */
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .metric-card { background: var(--surface-card); padding: 24px; border-radius: 20px; border: 1px solid var(--border-subtle); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); }
        .metric-card h3 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.75px; margin-bottom: 8px; font-weight: 600; }
        .metric-card .value { font-size: 34px; font-weight: 700; }

        /* Controls Area Grid */
        .controls-filter-container { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 15px; }
        .search-input-field { width: 100%; padding: 18px 24px; border-radius: 16px; border: 1px solid var(--border-subtle); background: var(--surface-card); font-size: 15px; outline: none; }
        .select-dropdown-filter { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid var(--border-subtle); background: var(--surface-card); color: var(--text-main); font-weight: 600; outline: none; cursor: pointer; }

        .smart-filter-row { display: flex; gap: 10px; margin-bottom: 35px; flex-wrap: wrap; }
        .filter-pill-btn { background: #ffffff; border: 1px solid var(--border-subtle); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .filter-pill-btn:hover { border-color: var(--brand-color); color: var(--brand-color); }
        .filter-pill-btn.active { background: var(--brand-color); color: #ffffff; border-color: var(--brand-color); }

        /* Cards Layout */
        .workspace-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
        .subject-container-card { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 28px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); transition: all 0.35s ease; display: flex; flex-direction: column; justify-content: space-between; }
        .subject-container-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border-color: #cbd5e1; }
        
        .card-top-flex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .subject-id-token { font-size: 13px; font-weight: 700; color: var(--text-muted); background: #f1f5f9; padding: 4px 10px; border-radius: 8px; }
        
        /* Trash Can Button */
        .remove-subject-action-btn { background: #fff5f5; border: 1px solid #ffe3e3; width: 34px; height: 34px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        .trash-lid { width: 14px; height: 2px; background: var(--accent-red); border-radius: 1px; position: relative; transition: 0.2s; transform-origin: left bottom; }
        .trash-lid::before { content: ''; position: absolute; top: -2px; left: 4px; width: 6px; height: 2px; background: var(--accent-red); border-radius: 1px 1px 0 0; }
        .trash-container { width: 12px; height: 12px; border: 2px solid var(--accent-red); border-top: none; border-radius: 0 0 2px 2px; position: relative; }
        .trash-container::after, .trash-container::before { content: ''; position: absolute; top: 2px; width: 2px; height: 6px; background: var(--accent-red); }
        .trash-container::before { left: 2px; } .trash-container::after { right: 2px; }
        .remove-subject-action-btn:hover { background: var(--accent-red); }
        .remove-subject-action-btn:hover .trash-lid { background: #ffffff; transform: rotate(-30deg) translateY(-2px); }
        .remove-subject-action-btn:hover .trash-container, .remove-subject-action-btn:hover .trash-container::before, .remove-subject-action-btn:hover .trash-container::after { border-color: #ffffff; background: #ffffff; }

        .subject-title { font-size: 20px; font-weight: 700; color: var(--text-main); line-height: 1.4; margin-bottom: 8px; }
        .dept-semester-label { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-bottom: 16px; }

        .pills-group { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag-pill { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .tag-pill.theory { background: #fef3c7; color: #d97706; }
        .tag-pill.lab { background: #ccfbf1; color: #0f766e; }
        .tag-pill.credit { background: #f1f5f9; color: #475569; }
        .tag-pill.ai-rule { background: #ecefef; color: #4f46e5; border: 1px dashed rgba(79, 70, 229, 0.3); }

        /* Eligible Faculty Trigger Button Inside Card */
        .faculty-eligibility-trigger { width: 100%; background: #f8fafc; border: 1px solid var(--border-subtle); color: #475569; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .faculty-eligibility-trigger:hover { background: #f1f5f9; color: var(--brand-color); border-color: #cbd5e1; }

        /* Popup Form Modals Layers */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-container { background: #ffffff; width: 90%; max-width: 460px; border-radius: 24px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); transform: translateY(20px); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-overlay.active .modal-container { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 1px solid #f1f5f9; padding-bottom: 14px; }
        .close-modal-btn { background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; color: var(--text-muted); }

        .form-group-block { margin-bottom: 18px; }
        .form-group-block label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-group-block input, .form-group-block select { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border-subtle); outline: none; }
        .submit-form-action-btn { width: 100%; background: var(--brand-color); color: #ffffff; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 8px; }

        /* Mapping Faculty List Style inside Modal */
        .faculty-list-mapping-box { list-style: none; margin-top: 10px; }
        .faculty-list-mapping-box li { display: flex; align-items: center; gap: 10px; padding: 12px; background: #f8fafc; border: 1px solid var(--border-subtle); border-radius: 10px; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        .faculty-list-mapping-box li .dot-icon { width: 8px; height: 8px; background: var(--accent-teal); border-radius: 50%; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header-wrapper">
        <div class="header-title">
            <h1>Subject Curriculum Hub</h1>
            <p>Manage courses schema blueprint parameters for the optimization algorithm engine.</p>
        </div>
        <div class="action-buttons-group">
            <button class="back-dashboard-btn" onclick="window.location.href='admin_dashboard.html'">← Dashboard</button>
            <button class="add-subject-master-btn" id="openAddSubjectFormBtn">＋ Add Course Curriculum</button>
        </div>
    </div>

    <div class="analytics-grid">
        <div class="metric-card">
            <h3>Total Courses</h3>
            <div class="value" id="countSubjectsMetric">0</div>
        </div>
        <div class="metric-card">
            <h3>Theory Core</h3>
            <div class="value" id="countTheoryMetric">0</div>
        </div>
        <div class="metric-card">
            <h3>Laboratory Units</h3>
            <div class="value" id="countLabMetric">0</div>
        </div>
    </div>

    <div class="controls-filter-container">
        <input type="text" id="subjectLiveSearch" class="search-input-field" placeholder="Search parameters via module titles or tracking codes...">
        <select id="dropdownSemesterFilter" class="select-dropdown-filter" onchange="runMasterFiltersPipeline()">
            <option value="all">All Semesters</option>
            <option value="CSE - 4th Sem">CSE - 4th Sem</option>
            <option value="CSE - 6th Sem">CSE - 6th Sem</option>
            <option value="IT - 4th Sem">IT - 4th Sem</option>
        </select>
    </div>

    <div class="smart-filter-row">
        <button class="filter-pill-btn active" onclick="applySmartFilter('all', this)">All Modules</button>
        <button class="filter-pill-btn" onclick="applySmartFilter('THEORY', this)">Theory Core</button>
        <button class="filter-pill-btn" onclick="applySmartFilter('LAB', this)">Laboratory Units</button>
        <button class="filter-pill-btn" onclick="applySmartFilter('4', this)">4 Credits</button>
        <button class="filter-pill-btn" onclick="applySmartFilter('3', this)">3 Credits</button>
    </div>

    <div class="workspace-cards-grid" id="subjectsGridSystem"></div>

</div>

<div class="modal-overlay" id="addSubjectFormOverlay">
    <div class="modal-container">
        <div class="modal-header">
            <div>
                <h2 style="font-size:20px; font-weight:700;">Add Course Module</h2>
                <p style="color: var(--text-muted); font-size: 13px; margin-top:2px;">Insert algorithmic curriculum details.</p>
            </div>
            <button class="close-modal-btn" id="closeFormAction">✕</button>
        </div>
        <form id="newSubjectRegistrationForm">
            <div class="form-group-block">
                <label for="inputSubjectId">System Tracking ID</label>
                <input type="number" id="inputSubjectId" placeholder="e.g., 203" required>
            </div>
            <div class="form-group-block">
                <label for="inputSubjectTitle">Course Module Title</label>
                <input type="text" id="inputSubjectTitle" placeholder="e.g., Cloud Computing" required>
            </div>
            <div class="form-group-block">
                <label for="selectSemesterMapping">Target Batch / Sem</label>
                <select id="selectSemesterMapping" required>
                    <option value="CSE - 4th Sem">CSE - 4th Sem</option>
                    <option value="CSE - 6th Sem">CSE - 6th Sem</option>
                    <option value="IT - 4th Sem">IT - 4th Sem</option>
                </select>
            </div>
            <div class="form-group-block">
                <label for="selectSubjectType">Instruction Variant</label>
                <select id="selectSubjectType" required>
                    <option value="THEORY">Theory Lecture Session</option>
                    <option value="LAB">Laboratory Practical Unit</option>
                </select>
            </div>
            <div class="form-group-block">
                <label for="selectCredits">Algorithmic Load Weight</label>
                <select id="selectCredits" required>
                    <option value="4">4 Credits</option>
                    <option value="3">3 Credits</option>
                    <option value="2">2 Credits</option>
                    <option value="1">1 Credit</option>
                </select>
            </div>
            <button type="submit" class="submit-form-action-btn">Deploy Curriculum Node</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="facultyMappingOverlay">
    <div class="modal-container">
        <div class="modal-header">
            <div>
                <h2 id="modalMappingTitle" style="font-size:20px; font-weight:700;">Eligible Instructors</h2>
                <p style="color: var(--text-muted); font-size: 13px; margin-top:2px;">AI engine workload allocation matrix.</p>
            </div>
            <button class="close-modal-btn" onclick="closeMappingModal()">✕</button>
        </div>
        <ul class="faculty-list-mapping-box" id="modalFacultyListContainer"></ul>
    </div>
</div>

<script src="subjects.js"></script>
</body>
</html>
